<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜数竞速</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: system-ui, sans-serif; color: #333;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 32px 36px; width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,.2); text-align: center;
    max-height: 90vh; overflow-y: auto;
  }
  h1 { font-size: 1.5rem; margin-bottom: 6px; }
  .sub { color: #888; font-size: .9rem; margin-bottom: 18px; }
  input, .input-row input {
    padding: 11px 14px; border: 2px solid #ddd; border-radius: 10px;
    font-size: 1rem; outline: none; transition: border .2s;
  }
  input:focus { border-color: #667eea; }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input { flex: 1; }
  button {
    padding: 11px 20px; border: none; border-radius: 10px; font-size: 1rem;
    cursor: pointer; background: #667eea; color: #fff; font-weight: 600;
    transition: background .2s, opacity .2s;
  }
  button:hover:not(:disabled) { background: #5a6fd6; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .btn-gray { background: #eee; color: #555; }
  .btn-gray:hover:not(:disabled) { background: #ddd; }
  .btn-full { width: 100%; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* 入口 */
  .join-row { display: flex; gap: 8px; margin-top: 12px; }
  .join-row input { flex: 1; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #bbb; font-size: .85rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }

  /* 大厅 */
  .room-code-box {
    background: #f5f3ff; border: 2px dashed #b4a5ff; border-radius: 12px;
    padding: 12px; margin-bottom: 16px; font-size: 1.4rem; letter-spacing: 4px;
    font-weight: 700; color: #5b4dc7; cursor: pointer; user-select: all;
  }
  .player-list { text-align: left; margin-bottom: 16px; }
  .player-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-radius: 8px; margin-bottom: 4px; background: #fafafa; font-size: .95rem;
  }
  .player-item .crown { font-size: 1.1rem; }
  .player-item .wins { margin-left: auto; color: #888; font-size: .85rem; }

  /* 游戏 */
  .msg {
    min-height: 44px; padding: 10px 12px; border-radius: 10px; font-size: .95rem;
    display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
  }
  .msg.higher { background: #fff3e0; color: #e65100; }
  .msg.lower  { background: #e3f2fd; color: #1565c0; }
  .msg.win    { background: #e8f5e9; color: #2e7d32; font-weight: 700; }
  .msg.info   { background: #f5f5f5; color: #666; }
  .stats { display: flex; justify-content: space-between; font-size: .88rem; color: #888; margin-bottom: 12px; }
  .feed {
    text-align: left; max-height: 120px; overflow-y: auto; margin-top: 10px;
    border-top: 1px solid #eee; padding-top: 8px; font-size: .85rem; color: #555;
  }
  .feed-item { padding: 3px 0; }
  .feed-item.higher { color: #e65100; }
  .feed-item.lower  { color: #1565c0; }

  /* 结算 */
  .lb-table { width: 100%; margin: 12px 0; }
  .lb-row {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-radius: 8px; margin-bottom: 4px; font-size: .95rem;
  }
  .lb-row:first-child { background: #fff8e1; }
  .lb-medal { width: 28px; font-size: 1.2rem; text-align: center; }
  .lb-name { flex: 1; text-align: left; }
  .lb-wins { color: #888; }

  .error-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: #d32f2f; color: #fff; padding: 10px 24px; border-radius: 10px;
    font-size: .95rem; z-index: 999; opacity: 0; transition: opacity .3s;
    pointer-events: none;
  }
  .error-toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <!-- 入口 -->
  <div id="screen-entry" class="screen active">
    <h1>🏎️ 猜数竞速</h1>
    <p class="sub">多人在线 · 共享范围 · 谁先猜中谁赢</p>
    <div class="input-row">
      <input id="nameInput" type="text" placeholder="输入昵称" maxlength="12" autofocus>
    </div>
    <button class="btn-full" onclick="doCreate()">创建房间</button>
    <div class="divider">或</div>
    <div class="join-row">
      <input id="codeInput" type="text" placeholder="房间号" maxlength="6">
      <button onclick="doJoin()">加入</button>
    </div>
  </div>

  <!-- 大厅 -->
  <div id="screen-lobby" class="screen">
    <h1>🏠 大厅</h1>
    <p class="sub">把房间号发给朋友</p>
    <div class="room-code-box" id="lobbyCode" title="点击复制" onclick="copyCode()"></div>
    <div class="player-list" id="lobbyPlayers"></div>
    <button id="startBtn" class="btn-full" onclick="doStart()">开始游戏</button>
    <button class="btn-gray btn-full" style="margin-top:8px" onclick="doLeave()">离开房间</button>
  </div>

  <!-- 游戏 -->
  <div id="screen-game" class="screen">
    <h1>🏎️ 猜数竞速 <span id="roundLabel" style="font-size:.85rem;color:#888"></span></h1>
    <div class="input-row" style="margin-top:14px">
      <input id="guessInput" type="number" min="1" max="100" placeholder="输入数字" autofocus>
      <button id="guessBtn" onclick="doGuess()">猜！</button>
    </div>
    <div id="gameMsg" class="msg info">快猜吧！</div>
    <div class="stats">
      <span>范围 <strong id="gameRange">1 ~ 100</strong></span>
      <span>你已猜 <strong id="myCount">0</strong> 次</span>
    </div>
    <div class="feed" id="gameFeed"></div>
  </div>

  <!-- 结算 -->
  <div id="screen-result" class="screen">
    <h1 id="resultTitle">🎉</h1>
    <p id="resultDetail" class="sub"></p>
    <div class="lb-table" id="resultLb"></div>
    <button id="nextRoundBtn" class="btn-full" onclick="doNextRound()">下一轮</button>
    <button class="btn-gray btn-full" style="margin-top:8px" onclick="doLeave()">退出房间</button>
  </div>
</div>

<div id="errorToast" class="error-toast"></div>

<script>
// ── 状态 ──────────────────────────────────────────
let ws, myId = null, myName = '', roomCode = '', hostId = null;
let players = [];

// ── WebSocket ─────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    if (myName) send({ type: 'setName', name: myName });
  };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'roomCreated':
        myId = msg.playerId;
        roomCode = msg.code;
        hostId = msg.hostId;
        players = msg.players;
        showLobby();
        break;

      case 'roomJoined':
        myId = msg.playerId;
        roomCode = msg.code;
        hostId = msg.hostId;
        players = msg.players;
        showLobby();
        break;

      case 'playerJoined':
        players.push(msg.player);
        renderLobbyPlayers();
        break;

      case 'playerLeft':
        players = msg.players;
        hostId = msg.newHostId || hostId;
        renderLobbyPlayers();
        break;

      case 'playerList':
        players = msg.players;
        hostId = msg.hostId;
        renderLobbyPlayers();
        break;

      case 'gameStarted':
        showGame(msg.range, msg.roundNumber);
        break;

      case 'guessResult':
        handleGuessResult(msg);
        break;

      case 'roundEnd':
        showResult(msg);
        break;

      case 'error':
        showError(msg.message);
        break;
    }
  };

  ws.onclose = () => {
    setTimeout(connect, 2000);
  };
}

function send(msg) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
}

// ── 屏幕切换 ──────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ── 入口操作 ──────────────────────────────────────
function doCreate() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showError('请输入昵称'); return; }
  myName = name;
  send({ type: 'setName', name });
  send({ type: 'createRoom' });
}

function doJoin() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showError('请输入昵称'); return; }
  const code = document.getElementById('codeInput').value.trim();
  if (!code) { showError('请输入房间号'); return; }
  myName = name;
  send({ type: 'setName', name });
  send({ type: 'joinRoom', code });
}

// ── 大厅 ──────────────────────────────────────────
function showLobby() {
  showScreen('lobby');
  document.getElementById('lobbyCode').textContent = roomCode;
  renderLobbyPlayers();
}

function renderLobbyPlayers() {
  const el = document.getElementById('lobbyPlayers');
  el.innerHTML = players.map(p => `
    <div class="player-item">
      <span class="crown">${p.id === hostId ? '👑' : '👤'}</span>
      <span>${escHtml(p.name)}${p.id === myId ? ' (你)' : ''}</span>
      <span class="wins">${p.wins} 胜</span>
    </div>
  `).join('');

  const btn = document.getElementById('startBtn');
  if (myId === hostId) {
    btn.style.display = '';
    btn.disabled = players.length < 2;
    btn.textContent = players.length < 2 ? '至少需要2人' : '开始游戏';
  } else {
    btn.style.display = 'none';
  }
}

function copyCode() {
  navigator.clipboard.writeText(roomCode).then(() => showError('已复制房间号'));
}

function doStart() { send({ type: 'startGame' }); }

// ── 游戏 ──────────────────────────────────────────
function showGame(range, round) {
  showScreen('game');
  document.getElementById('roundLabel').textContent = `第${round}轮`;
  document.getElementById('gameRange').textContent = `${range[0]} ~ ${range[1]}`;
  document.getElementById('myCount').textContent = '0';
  document.getElementById('gameFeed').innerHTML = '';
  setGameMsg('info', '快猜吧！');
  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').disabled = false;
  document.getElementById('guessBtn').disabled = false;
  document.getElementById('guessInput').focus();
}

function setGameMsg(cls, text) {
  const el = document.getElementById('gameMsg');
  el.className = 'msg ' + cls;
  el.textContent = text;
}

function handleGuessResult(msg) {
  const feed = document.getElementById('gameFeed');
  const isMe = msg.playerId === myId;
  const name = isMe ? '你' : msg.playerName;
  const dir = msg.hint === 'higher' ? '太小了 ↑' : '太大了 ↓';

  feed.insertAdjacentHTML('afterbegin',
    `<div class="feed-item ${msg.hint}">${escHtml(name)} 猜了 ${msg.guess} → ${dir}</div>`
  );

  document.getElementById('gameRange').textContent = `${msg.range[0]} ~ ${msg.range[1]}`;

  if (isMe) {
    document.getElementById('myCount').textContent = msg.attemptCount;
    setGameMsg(msg.hint, msg.hint === 'higher'
      ? `📈 ${msg.guess} 太小了！往大猜~`
      : `📉 ${msg.guess} 太大了！往小猜~`);
  } else {
    setGameMsg('info', `${escHtml(msg.playerName)} 猜了 ${msg.guess}`);
  }

  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').focus();
}

function doGuess() {
  const input = document.getElementById('guessInput');
  const v = parseInt(input.value, 10);
  if (isNaN(v)) { showError('请输入数字'); return; }
  send({ type: 'guess', value: v });
}

// ── 结算 ──────────────────────────────────────────
function showResult(msg) {
  showScreen('result');

  if (msg.reason) {
    document.getElementById('resultTitle').textContent = '⚠️ ' + msg.reason;
    document.getElementById('resultDetail').textContent = `答案是 ${msg.answer}`;
  } else {
    const isWinner = msg.winner && msg.winner.id === myId;
    document.getElementById('resultTitle').textContent = isWinner
      ? '🎉 你赢了！'
      : `🏆 ${msg.winner.name} 赢了！`;
    document.getElementById('resultDetail').textContent =
      `答案: ${msg.answer} | ${msg.winner.name} 用了 ${msg.winner.attempts} 次`;
  }

  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('resultLb').innerHTML = msg.leaderboard.map((p, i) => `
    <div class="lb-row">
      <span class="lb-medal">${medals[i] || (i + 1)}</span>
      <span class="lb-name">${escHtml(p.name)}</span>
      <span class="lb-wins">${p.wins} 胜</span>
    </div>
  `).join('');

  const nextBtn = document.getElementById('nextRoundBtn');
  if (myId === hostId) {
    nextBtn.style.display = '';
    nextBtn.textContent = '下一轮';
  } else {
    nextBtn.style.display = 'none';
  }
}

function doNextRound() { send({ type: 'nextRound' }); }

// ── 离开 ──────────────────────────────────────────
function doLeave() {
  send({ type: 'leaveRoom' });
  roomCode = '';
  hostId = null;
  players = [];
  showScreen('entry');
}

// ── 工具 ──────────────────────────────────────────
function showError(text) {
  const el = document.getElementById('errorToast');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 键盘事件 ──────────────────────────────────────
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doCreate();
});
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doJoin();
});
document.getElementById('guessInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doGuess();
});

// ── 启动 ──────────────────────────────────────────
connect();
</script>
</body>
</html>
