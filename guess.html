<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜数字游戏</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 1rem;
            width: 80px;
            border: 2px solid #ddd;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #1a73e8;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 5px;
            margin-left: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1557b0;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #message {
            margin-top: 1.5rem;
            font-weight: bold;
            min-height: 1.5em;
        }
        .success {
            color: #28a745;
        }
        .error {
            color: #dc3545;
        }
        .info {
            color: #666;
        }
        #resetBtn {
            margin-top: 1rem;
            background-color: #6c757d;
            display: none;
        }
        #resetBtn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>猜数字游戏</h1>
    <p>我已经想好了一个 1 到 100 之间的数字，你能猜到它是多少吗？</p>

    <div class="game-controls">
        <input type="number" id="guessInput" min="1" max="100" placeholder="0">
        <button id="guessBtn">提交猜测</button>
    </div>

    <div id="message"></div>
    <div id="stats" class="info" style="margin-top: 10px;"></div>
    <button id="resetBtn">重新开始</button>
</div>

<script>
    let targetNumber;
    let attempts = 0;
    let gameOver = false;

    const guessInput = document.getElementById('guessInput');
    const guessBtn = document.getElementById('guessBtn');
    const message = document.getElementById('message');
    const stats = document.getElementById('stats');
    const resetBtn = document.getElementById('resetBtn');

    function initGame() {
        targetNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        gameOver = false;

        message.textContent = '';
        message.className = '';
        stats.textContent = '';
        guessInput.value = '';
        guessInput.disabled = false;
        guessBtn.disabled = false;
        resetBtn.style.display = 'none';

        console.log('Cheat: Target number is ' + targetNumber); // 方便调试
    }

    function handleGuess() {
        const rawValue = guessInput.value;
        const userGuess = Number(rawValue);

        if (rawValue === '' || isNaN(userGuess) || !Number.isInteger(userGuess) || userGuess < 1 || userGuess > 100) {
            message.textContent = '请输入 1 到 100 之间的整数！';
            message.className = 'error';
            return;
        }

        attempts++;

        if (userGuess === targetNumber) {
            message.textContent = `🎉 恭喜你！猜对了！数字就是 ${targetNumber}。`;
            message.className = 'success';
            stats.textContent = `你一共尝试了 ${attempts} 次。`;
            endGame();
        } else if (userGuess < targetNumber) {
            message.textContent = '太小了！再试一次。';
            message.className = 'info';
        } else {
            message.textContent = '太大了！再试一次。';
            message.className = 'info';
        }

        guessInput.value = '';
        guessInput.focus();
    }

    function endGame() {
        gameOver = true;
        guessInput.disabled = true;
        guessBtn.disabled = true;
        resetBtn.style.display = 'inline-block';
    }

    guessBtn.addEventListener('click', handleGuess);

    guessInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            handleGuess();
        }
    });

    resetBtn.addEventListener('click', initGame);

    // 启动游戏
    initGame();
</script>

</body>
</html>
